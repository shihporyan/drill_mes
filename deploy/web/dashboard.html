<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鑽孔機稼動監控</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', 'Microsoft JhengHei', 'Helvetica Neue', sans-serif; background: #f6f7f9; color: #1a1a2e; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
</style>
<script src="/lib/react.production.min.js"></script>
<script src="/lib/react-dom.production.min.js"></script>
<script src="/lib/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ============ CONFIG ============
const REFRESH_INTERVAL = 600; // seconds (10 min)
const API_BASE = window.location.origin;
const TARGET = 75;
const COLOR_DRILL = "#059669";
const COLOR_LASER = "#6366f1";
const COLOR_TARGET = "#3b82f6";
const COLOR_TEXT_PRIMARY = "#111827";
const COLOR_TEXT_SECONDARY = "#6b7280";
const COLOR_TEXT_MUTED = "#9ca3af";
const COLOR_BG = "#f6f7f9";
const COLOR_CARD = "#ffffff";
const COLOR_BORDER = "#e5e7eb";
const COLOR_NO_DATA = "#f3f4f6";

// ============ API DATA LAYER ============
// State mapping: API uses RUN/RESET/STOP; UI uses RUN/IDLE/STOP
const mapState = (s) => s === "RESET" ? "IDLE" : s;

async function apiFetch(path) {
  const resp = await fetch(API_BASE + path);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  return resp.json();
}

// ============ MOCK DATA (fallback when API unavailable) ============
const MOCK_DRILL_STATES = ["RUN","RUN","RUN","RUN","RUN","RUN","RUN","RUN","IDLE","IDLE","STOP","STOP","STOP"];
const MOCK_LASER_STATES = ["RUN","RUN","IDLE","STOP"];
const MOCK_WO = ["WO-2026-0341","WO-2026-0342","WO-2026-0338","WO-2026-0345","WO-2026-0350","WO-2026-0355","WO-2026-0360","WO-2026-0348"];
function genMockMachines() {
  const drills = MOCK_DRILL_STATES.map((state,i) => {
    const id = "M" + String(i+1).padStart(2,"0");
    const dur = state==="RUN"?10+Math.floor(Math.random()*180): state==="IDLE"?3+Math.floor(Math.random()*45): 5+Math.floor(Math.random()*120);
    const uToday = state==="RUN"?65+Math.floor(Math.random()*25): state==="IDLE"?30+Math.floor(Math.random()*20): Math.floor(Math.random()*15);
    const holes = state==="RUN"?8000+Math.floor(Math.random()*12000): state==="IDLE"?2000+Math.floor(Math.random()*3000): Math.floor(Math.random()*1000);
    return { id, type:"takeuchi", state, mode: state==="RUN"?"AUTO":"MAN", program: state==="RUN"?"O100.txt":"", tool_num: state==="RUN"?"084":"000", drill_dia: state==="RUN"?1.0:0.15, since:"", duration_minutes: dur, util_today: uToday, hole_count_today: holes, counter: 173400000+i*1000, work_order: state==="RUN"?MOCK_WO[i%MOCK_WO.length]:null, work_order_side: state==="RUN"?"A":null };
  });
  const lasers = MOCK_LASER_STATES.map((state,i) => {
    const id = "L" + String(i+1);
    const dur = state==="RUN"?10+Math.floor(Math.random()*120): state==="IDLE"?3+Math.floor(Math.random()*48): 5+Math.floor(Math.random()*60);
    const uToday = state==="RUN"?35+Math.floor(Math.random()*30): state==="IDLE"?15+Math.floor(Math.random()*15): Math.floor(Math.random()*10);
    const holes = state==="RUN"?3000+Math.floor(Math.random()*5000): state==="IDLE"?500+Math.floor(Math.random()*1500): Math.floor(Math.random()*500);
    return { id, type:"kataoka", state, mode: state==="RUN"?"AUTO":"MAN", program: state==="RUN"?"LSR001.lsr":"", tool_num: state==="RUN"?"012":"000", drill_dia: state==="RUN"?0.1:0.05, since:"", duration_minutes: dur, util_today: uToday, hole_count_today: holes, counter: 50000000+i*1000, work_order: state==="RUN"?MOCK_WO[(i+3)%MOCK_WO.length]:null, work_order_side: state==="RUN"?"TOP":null };
  });
  return drills.concat(lasers);
}
function genMockOverview() {
  const machines = genMockMachines();
  const running = machines.filter(m=>m.state==="RUN").length;
  const idle = machines.filter(m=>m.state==="IDLE").length;
  const stopped = machines.filter(m=>m.state==="STOP").length;
  const offline = machines.filter(m=>m.state==="OFFLINE").length;
  return { timestamp: new Date().toISOString().slice(0,19), machines, summary: { running, idle, stopped, offline, total: machines.length }, health: machines.map(m=>({id:m.id,is_online:m.state!=="OFFLINE",last_seen:null})) };
}
function genMockHeatmap() {
  const ids = ["M01","M02","M03","M04","M05","M06","M07","M08","M09","M10","M11","M12","M13","L1","L2","L3","L4"];
  const machines = ids.map(id => {
    const isLaser = id.startsWith("L");
    return { id, hours: Array.from({length:24},(_,h)=>({ hour:h, utilization: h>=8&&h<20 ? (isLaser?25+Math.floor(Math.random()*50):40+Math.floor(Math.random()*50)) : (isLaser?Math.floor(Math.random()*20):Math.floor(Math.random()*30)), hole_count: Math.floor(Math.random()*800) })) };
  });
  return { date: new Date().toISOString().slice(0,10), machines };
}
function genMockUtilization(period) {
  const ids = ["M13","M14","L2","L3"];
  const machines = ids.map(id => ({ id, utilization: id.startsWith("L")?30+Math.floor(Math.random()*30):50+Math.floor(Math.random()*40), run_seconds: 10000+Math.floor(Math.random()*8000), total_seconds: 20000+Math.floor(Math.random()*5000), hole_count: 5000+Math.floor(Math.random()*10000) }));
  return { period, date: new Date().toISOString().slice(0,10), machines, fleet_average: Math.round(machines.reduce((s,m)=>s+m.utilization,0)/machines.length*10)/10, target: TARGET };
}

async function fetchOverview() {
  try { return await apiFetch("/api/drilling/overview"); } catch(e) { console.warn("API unavailable, using mock:", e.message); return genMockOverview(); }
}
async function fetchHeatmap(date) {
  try { return await apiFetch("/api/drilling/heatmap?date=" + date); } catch(e) { return genMockHeatmap(); }
}
async function fetchUtilization(period, date) {
  try { return await apiFetch("/api/drilling/utilization?period=" + period + "&date=" + date); } catch(e) { return genMockUtilization(period); }
}
async function fetchTransitions(machine, date) {
  try { return await apiFetch("/api/drilling/transitions?machine=" + machine + "&date=" + date); } catch(e) { return { machine_id: machine, date, transitions: [] }; }
}
async function fetchUtilizationTrend(level, params) {
  const qs = new URLSearchParams({level, ...params}).toString();
  try { return await apiFetch("/api/drilling/utilization/trend?" + qs); } catch(e) { return { level, data: [], summary: {} }; }
}

// ============ HELPERS ============
const SC = {
  RUN:    {label:"稼動中",bg:"#059669"},
  IDLE:   {label:"閒置",  bg:"#dc2626"},
  RESET:  {label:"閒置",  bg:"#dc2626"},
  STOP:   {label:"停機",  bg:"#dc2626"},
  OFFLINE:{label:"離線",  bg:"#dc2626"},
};
const fmt = n => n ? n.toLocaleString() : "—";
const durStr = m => m >= 60 ? `${Math.floor(m/60)}h ${m%60}m` : `${m} min`;
const getMachineType = (id, overviewMachines) => {
  if (overviewMachines) { const m = overviewMachines.find(x => x.id === id); if (m) return m.type; }
  return id.startsWith("L") ? "kataoka" : "takeuchi";
};
const machineTypeColor = (id, overviewMachines) => getMachineType(id, overviewMachines) === "kataoka" ? COLOR_LASER : COLOR_DRILL;

// ============ HEADER ============
function Header({tab, setTab, countdown, apiOk}) {
  const cm = Math.floor(countdown/60), cs = String(countdown%60).padStart(2,"0");
  const tabs = [
    {key:"overview", label:"機台總覽"},
    {key:"ranking",  label:"稼動排行"},
    {key:"analysis", label:"稼動分析"},
    {key:"detail",   label:"作業細節"},
  ];
  return (
    <div style={{background:"#fff",borderBottom:"1px solid #e5e7eb",padding:"0 28px",position:"sticky",top:0,zIndex:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 0 0"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:6,height:28,borderRadius:3,background:"linear-gradient(180deg,#059669,#6366f1)"}}/>
          <div>
            <h1 style={{margin:0,fontSize:20,fontWeight:700,color:"#111827"}}>鑽孔機稼動監控</h1>
            <p style={{margin:0,fontSize:11,color:"#9ca3af"}}>Takeuchi + Kataoka Laser ｜ 每 10 分鐘同步</p>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {!apiOk && <span style={{fontSize:11,color:"#d97706",background:"#fffbeb",padding:"4px 10px",borderRadius:6,border:"1px solid #fde68a",fontWeight:600}}>Mock 模式</span>}
          <div style={{display:"flex",alignItems:"center",gap:6,padding:"4px 10px",background:"#f0fdf4",borderRadius:6,border:"1px solid #bbf7d0"}}>
            <div style={{width:6,height:6,borderRadius:"50%",background:"#22c55e",animation:"pulse 2s infinite"}}/>
            <span style={{fontSize:11,color:"#059669",fontWeight:600,fontVariantNumeric:"tabular-nums"}}>{cm}:{cs} 後更新</span>
          </div>
        </div>
      </div>
      <div style={{display:"flex",gap:0,marginTop:12}}>
        {tabs.map(t=>(
          <button key={t.key} onClick={()=>setTab(t.key)} style={{
            padding:"8px 20px 10px",border:"none",background:"transparent",cursor:"pointer",
            borderBottom: tab===t.key?"2.5px solid #111827":"2.5px solid transparent",
            color: tab===t.key?"#111827":"#9ca3af",
            fontWeight: tab===t.key?700:500, fontSize:14, transition:"all 0.15s",
          }}>{t.label}</button>
        ))}
      </div>
    </div>
  );
}

// ============ TAB 1: OVERVIEW ============
function OverviewTab({data}) {
  if (!data) return <div style={{padding:40,textAlign:"center",color:"#9ca3af"}}>載入中...</div>;
  const {machines, summary} = data;
  const takeuchi = machines.filter(m => m.type === "takeuchi" || (!m.type && !m.id.startsWith("L")));
  const kataoka = machines.filter(m => m.type === "kataoka" || (!m.type && m.id.startsWith("L")));
  const groups = [
    {label:"機鑽 Takeuchi", machines: takeuchi, accent: COLOR_DRILL},
    ...(kataoka.length > 0 ? [{label:"雷鑽 Kataoka", machines: kataoka, accent: COLOR_LASER}] : []),
  ];
  return (
    <div>
      <div style={{display:"flex",gap:12,marginBottom:20}}>
        {[
          {label:"稼動中",val:summary.running,unit:`/ ${machines.length} 台`,color:"#059669"},
          {label:"閒置",val:summary.idle,unit:"台",color:"#dc2626"},
          {label:"停機 / 離線",val:(summary.stopped||0)+(summary.offline||0),unit:"台",color:"#dc2626"},
        ].map((c,i)=>(
          <div key={i} style={{flex:1,background:"#fff",borderRadius:10,padding:"14px 18px",border:"1px solid #e5e7eb",borderLeft:`4px solid ${c.color}`}}>
            <div style={{fontSize:11,color:"#6b7280",marginBottom:2}}>{c.label}</div>
            <div style={{display:"flex",alignItems:"baseline",gap:4}}>
              <span style={{fontSize:32,fontWeight:800,color:c.color,lineHeight:1}}>{c.val}</span>
              <span style={{fontSize:13,color:"#9ca3af"}}>{c.unit}</span>
            </div>
          </div>
        ))}
      </div>
      {groups.map(g=>(
        <div key={g.label} style={{marginBottom:20}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <div style={{width:4,height:16,borderRadius:2,background:g.accent}}/>
            <span style={{fontSize:14,fontWeight:700,color:"#111827"}}>{g.label}</span>
            <span style={{fontSize:12,color:"#9ca3af"}}>({g.machines.length} 台)</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(220px, 1fr))",gap:10}}>
            {g.machines.map(m=>{
              const displayState = mapState(m.state);
              const s = SC[displayState] || SC.OFFLINE;
              const isIdleTooLong = displayState==="IDLE"&&(m.duration_minutes||0)>30;
              return (
                <div key={m.id} style={{background:"#fff",borderRadius:10,overflow:"hidden",border:"1px solid #e5e7eb"}}>
                  <div style={{background:s.bg,color:"#fff",padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:15,fontWeight:800}}>{m.id}</span>
                    <span style={{fontSize:12,fontWeight:600,background:"rgba(255,255,255,0.2)",padding:"2px 10px",borderRadius:20}}>{s.label}</span>
                  </div>
                  <div style={{padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <div style={{fontSize:11,color:"#9ca3af"}}>{displayState==="OFFLINE"?"離線時間":"持續時間"}</div>
                      <div style={{fontSize:18,fontWeight:700,color:"#111827"}}>{durStr(m.duration_minutes||0)}</div>
                    </div>
                    {isIdleTooLong ? (
                      <div style={{fontSize:11,fontWeight:600,color:"#dc2626",background:"#fef2f2",padding:"3px 8px",borderRadius:4}}>⚠ 閒置過久</div>
                    ) : displayState==="RUN" && m.work_order ? (
                      <div style={{textAlign:"right"}}>
                        <div style={{fontSize:10,color:"#9ca3af"}}>工號</div>
                        <div style={{fontSize:12,fontWeight:600,color:"#374151"}}>{m.work_order}{m.work_order_side ? `.${m.work_order_side}` : ""}</div>
                      </div>
                    ) : null}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      ))}
      <div style={{display:"flex",gap:16,fontSize:12,color:"#6b7280"}}>
        <div style={{display:"flex",alignItems:"center",gap:5}}>
          <div style={{width:14,height:8,borderRadius:2,background:"#059669"}}/><span>稼動中</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:5}}>
          <div style={{width:14,height:8,borderRadius:2,background:"#dc2626"}}/><span>閒置 / 停機 / 離線</span>
        </div>
      </div>
    </div>
  );
}

// ============ RANKING BAR CHART ============
function RankingBarChart({data, drillLevel, onBarClick, accentColor, chartH}) {
  const maxVal = 100;
  return (
    <div style={{position:"relative",height:chartH+60,paddingTop:20}}>
      {/* Target line */}
      <div style={{position:"absolute",left:0,right:0,top:20+(chartH*(1-TARGET/maxVal)),display:"flex",alignItems:"center"}}>
        <div style={{flex:1,borderTop:`2px dashed ${COLOR_TARGET}`}}/>
        <span style={{fontSize:11,color:COLOR_TARGET,fontWeight:600,marginLeft:6,padding:"2px 6px",background:"#eff6ff",borderRadius:4,whiteSpace:"nowrap"}}>目標 {TARGET}%</span>
      </div>
      {/* Y-axis labels */}
      {[0,25,50,75,100].map(v=>(
        <div key={v} style={{position:"absolute",left:0,top:20+(chartH*(1-v/maxVal))-6,fontSize:10,color:"#d1d5db"}}>{v}%</div>
      ))}
      {/* Bars */}
      <div style={{display:"flex",alignItems:"flex-end",height:chartH,paddingLeft:32,gap:drillLevel==="year"?4:12}}>
        {data.map((d,i)=>{
          const hasData = d.util !== null;
          const h = hasData ? Math.max(2, chartH * d.util / maxVal) : 2;
          const barColor = hasData ? accentColor : COLOR_NO_DATA;
          const barOpacity = !hasData ? 1 : (d.util >= TARGET ? 1 : 0.45);
          const canClick = hasData && onBarClick && ((drillLevel==="year") || (drillLevel==="month"));
          return (
            <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",cursor:canClick?"pointer":"default"}}
              onClick={()=>{ if(canClick) onBarClick(i,d); }}>
              {d.isCurrent && hasData && (
                <div style={{width:8,height:8,borderRadius:"50%",background:COLOR_TARGET,border:"2px solid #fff",marginBottom:2,boxShadow:"0 0 0 1px "+COLOR_TARGET}}/>
              )}
              {hasData && <div style={{fontSize:12,fontWeight:700,color:COLOR_TEXT_PRIMARY,marginBottom:4}}>{Math.round(d.util)}%</div>}
              <div style={{width:"100%",maxWidth:drillLevel==="year"?40:56,height:h,background:barColor,borderRadius:"4px 4px 0 0",transition:"height 0.4s",
                opacity:barOpacity,minHeight:2}}/>
              <div style={{fontSize:11,fontWeight:d.isCurrent?700:500,color:d.isCurrent?COLOR_TARGET:COLOR_TEXT_SECONDARY,marginTop:6}}>{d.label}</div>
              {hasData && <div style={{fontSize:10,color:COLOR_TEXT_MUTED,marginTop:1}}>{fmt(d.holes)} 孔</div>}
              {!hasData && <div style={{fontSize:10,color:"#d1d5db",marginTop:1}}>—</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ============ TAB 2: RANKING ============
function RankingTab({overviewData}) {
  const now = new Date();
  const currentYear = now.getFullYear();
  const currentMonthStr = now.toISOString().slice(0,7);
  const [trendAll, setTrendAll] = useState(null);
  const [trendDrill, setTrendDrill] = useState(null);
  const [trendLaser, setTrendLaser] = useState(null);
  const [utilMonth, setUtilMonth] = useState(null);
  const [drillLevel, setDrillLevel] = useState("year");
  const [selectedMonth, setSelectedMonth] = useState(null);
  const [selectedWeek, setSelectedWeek] = useState(null);
  const [loading, setLoading] = useState(true);
  const [kpiFilter, setKpiFilter] = useState("all");

  const fetchTrends = (level, params) => {
    setLoading(true);
    Promise.all([
      fetchUtilizationTrend(level, params),
      fetchUtilizationTrend(level, {...params, type:"takeuchi"}),
      fetchUtilizationTrend(level, {...params, type:"kataoka"}),
    ]).then(([all, drill, laser]) => {
      setTrendAll(all); setTrendDrill(drill); setTrendLaser(laser); setLoading(false);
    });
  };

  useEffect(()=>{
    fetchTrends("year", {year: String(currentYear)});
    fetchUtilization("month", currentMonthStr).then(setUtilMonth);
  },[]);

  const drillToMonth = (monthNum) => {
    setSelectedMonth(monthNum);
    setSelectedWeek(null);
    setDrillLevel("month");
    fetchTrends("month", {year: String(currentYear), month: String(monthNum)});
  };
  const drillToWeek = (weekNum, weekStart) => {
    setSelectedWeek(weekNum);
    setDrillLevel("week");
    fetchTrends("week", {year: String(currentYear), month: String(selectedMonth), week: String(weekNum), week_start: weekStart});
  };
  const goToYear = () => {
    setSelectedMonth(null); setSelectedWeek(null); setDrillLevel("year");
    fetchTrends("year", {year: String(currentYear)});
  };
  const goToMonth = () => {
    setSelectedWeek(null); setDrillLevel("month");
    fetchTrends("month", {year: String(currentYear), month: String(selectedMonth)});
  };

  if (loading || !trendAll) return <div style={{padding:40,textAlign:"center",color:"#9ca3af"}}>載入中...</div>;

  const sAll = trendAll.summary || {};
  const sDrill = trendDrill && trendDrill.summary || {};
  const sLaser = trendLaser && trendLaser.summary || {};
  const avgUtilAll = sAll.avg_util || 0;
  const avgUtilDrill = sDrill.avg_util || 0;
  const avgUtilLaser = sLaser.avg_util || 0;
  const drillCount = sDrill.machine_count || 0;
  const laserCount = sLaser.machine_count || 0;
  const allCount = sAll.machine_count || 0;

  // Compute type-specific averages from per-machine monthly utilization (for compare cards)
  const ovMachines = overviewData && overviewData.machines ? overviewData.machines : [];
  const monthMachines = utilMonth && utilMonth.machines ? utilMonth.machines : [];
  const drillMonth = monthMachines.filter(m => getMachineType(m.id, ovMachines) === "takeuchi");
  const laserMonth = monthMachines.filter(m => getMachineType(m.id, ovMachines) === "kataoka");
  const drillAvgMonth = drillMonth.length ? Math.round(drillMonth.reduce((s,m)=>s+m.utilization,0)/drillMonth.length) : 0;
  const laserAvgMonth = laserMonth.length ? Math.round(laserMonth.reduce((s,m)=>s+m.utilization,0)/laserMonth.length) : 0;

  // KPI filter
  const kpiAvg = kpiFilter === "drill" ? Math.round(avgUtilDrill) : kpiFilter === "laser" ? Math.round(avgUtilLaser) : Math.round(avgUtilAll);
  const kpiCount = kpiFilter === "drill" ? drillCount : kpiFilter === "laser" ? laserCount : allCount;
  const kpiTypeLabel = kpiFilter === "drill" ? "機鑽" : kpiFilter === "laser" ? "雷鑽" : "全部";
  const periodLabel = `期間平均稼動率（${kpiTypeLabel} ${kpiCount} 台）`;

  // Chart title
  const chartTitle = drillLevel === "year"
    ? `${currentYear} 年 — 各月平均稼動率`
    : drillLevel === "month"
    ? `${currentYear} 年 ${selectedMonth} 月 — 各週平均稼動率`
    : `${currentYear} 年 ${selectedMonth} 月 第${selectedWeek}週 — 各日平均稼動率`;

  const handleBarClick = (i, d) => {
    if (drillLevel === "year") drillToMonth(d.month);
    else if (drillLevel === "month") drillToWeek(d.week, d.week_start);
  };

  const drillData = (trendDrill && trendDrill.data) || [];
  const laserData = (trendLaser && trendLaser.data) || [];
  const hasLaser = laserCount > 0 && laserData.some(d => d.util !== null);
  const hasDrill = drillCount > 0;

  const breadcrumbStyle = (isCurrent) => ({
    fontSize:12, padding:"4px 10px", borderRadius:6, fontWeight:600,
    border:"1px solid",
    cursor: isCurrent ? "default" : "pointer",
    background:  isCurrent ? "#f3f4f6"          : "#eff6ff",
    color:       isCurrent ? COLOR_TEXT_PRIMARY : COLOR_TARGET,
    borderColor: isCurrent ? COLOR_BORDER       : "#bfdbfe",
  });

  return (
    <div>
      <div style={{display:"flex",gap:12,marginBottom:20,alignItems:"stretch"}}>
        <div style={{flex:2,background:"#fff",borderRadius:12,padding:"18px 24px",border:"1px solid #e5e7eb"}}>
          <div style={{display:"flex",gap:4,marginBottom:10}}>
            {[{key:"all",label:"全部"},{key:"drill",label:"機鑽"},{key:"laser",label:"雷鑽"}].map(f=>(
              <button key={f.key} onClick={()=>setKpiFilter(f.key)} style={{
                padding:"4px 14px",borderRadius:5,border:"1.5px solid",fontSize:12,fontWeight:600,cursor:"pointer",transition:"all 0.15s",
                background:kpiFilter===f.key?"#111827":"#fff",
                color:kpiFilter===f.key?"#fff":"#6b7280",
                borderColor:kpiFilter===f.key?"#111827":"#e5e7eb",
              }}>{f.label}</button>
            ))}
          </div>
          <div style={{fontSize:11,color:"#6b7280",marginBottom:4}}>{periodLabel}</div>
          <div style={{display:"flex",alignItems:"baseline",gap:6}}>
            <span style={{fontSize:56,fontWeight:800,color:COLOR_TEXT_PRIMARY,lineHeight:1,fontVariantNumeric:"tabular-nums",letterSpacing:"-2px"}}>{kpiAvg}</span>
            <span style={{fontSize:24,fontWeight:700,color:COLOR_TEXT_PRIMARY}}>%</span>
          </div>
          <div style={{fontSize:12,color:kpiAvg>=TARGET?COLOR_DRILL:"#d97706",marginTop:4,fontWeight:600}}>
            {kpiAvg>=TARGET?"✓ 達標":"✗ 未達標"}
            <span style={{color:COLOR_TEXT_MUTED,fontWeight:400,marginLeft:8}}>目標 {TARGET}%</span>
          </div>
        </div>
        {drillMonth.length > 0 && (
          <div style={{flex:1,background:"#f0fdf4",borderRadius:12,padding:"18px 20px",border:"1px solid #bbf7d0",display:"flex",flexDirection:"column",justifyContent:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
              <div style={{width:10,height:10,borderRadius:2,background:COLOR_DRILL}}/>
              <span style={{fontSize:12,color:"#6b7280"}}>機鑽平均 ({drillMonth.length} 台)</span>
            </div>
            <div style={{fontSize:36,fontWeight:800,color:COLOR_DRILL,lineHeight:1}}>{drillAvgMonth}%</div>
          </div>
        )}
        {laserMonth.length > 0 && (
          <div style={{flex:1,background:"#eef2ff",borderRadius:12,padding:"18px 20px",border:"1px solid #c7d2fe",display:"flex",flexDirection:"column",justifyContent:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
              <div style={{width:10,height:10,borderRadius:2,background:COLOR_LASER}}/>
              <span style={{fontSize:12,color:"#6b7280"}}>雷鑽平均 ({laserMonth.length} 台)</span>
            </div>
            <div style={{fontSize:36,fontWeight:800,color:COLOR_LASER,lineHeight:1}}>{laserAvgMonth}%</div>
          </div>
        )}
      </div>

      <div style={{background:"#fff",borderRadius:12,border:"1px solid #e5e7eb",padding:"24px 28px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {/* Breadcrumbs */}
            <span onClick={drillLevel==="year"?undefined:goToYear} style={breadcrumbStyle(drillLevel==="year")}>年度總覽</span>
            {selectedMonth && <>
              <span style={{color:"#d1d5db"}}>›</span>
              <span onClick={drillLevel==="month"?undefined:goToMonth} style={breadcrumbStyle(drillLevel==="month")}>{selectedMonth}月</span>
            </>}
            {selectedWeek && <>
              <span style={{color:"#d1d5db"}}>›</span>
              <span style={breadcrumbStyle(true)}>第{selectedWeek}週</span>
            </>}
          </div>
          {drillLevel !== "week" && (
            <div style={{fontSize:12,color:"#9ca3af",display:"flex",alignItems:"center",gap:4}}>
              <span>👆</span> 點擊柱狀下鑽
            </div>
          )}
        </div>

        <div style={{fontSize:16,fontWeight:700,color:"#111827",marginBottom:16}}>{chartTitle}</div>

        {/* Drill chart */}
        {hasDrill && (
          <div style={{marginBottom: hasLaser ? 20 : 0}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
              <div style={{width:4,height:14,borderRadius:2,background:COLOR_DRILL}}/>
              <span style={{fontSize:13,fontWeight:700,color:"#111827"}}>機鑽 Takeuchi</span>
              <span style={{fontSize:12,color:"#9ca3af"}}>{drillCount} 台 ｜ 平均 {Math.round(avgUtilDrill)}%</span>
            </div>
            <RankingBarChart data={drillData} drillLevel={drillLevel} onBarClick={drillLevel!=="week"?handleBarClick:null} accentColor={COLOR_DRILL} chartH={200}/>
          </div>
        )}

        {hasDrill && hasLaser && <div style={{height:1,background:"#e5e7eb",margin:"8px 0 20px"}}/>}

        {/* Laser chart */}
        {hasLaser && (
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
              <div style={{width:4,height:14,borderRadius:2,background:COLOR_LASER}}/>
              <span style={{fontSize:13,fontWeight:700,color:"#111827"}}>雷鑽 Kataoka</span>
              <span style={{fontSize:12,color:"#9ca3af"}}>{laserCount} 台 ｜ 平均 {Math.round(avgUtilLaser)}%</span>
            </div>
            <RankingBarChart data={laserData} drillLevel={drillLevel} onBarClick={drillLevel!=="week"?handleBarClick:null} accentColor={COLOR_LASER} chartH={200}/>
          </div>
        )}
      </div>
    </div>
  );
}

// ============ TAB 3: ANALYSIS ============
function AnalysisTab({overviewData}) {
  const [heatData, setHeatData] = useState(null);
  const [utilMonth, setUtilMonth] = useState(null);
  const [hoveredCell, setHoveredCell] = useState(null);
  const [filter, setFilter] = useState("all");
  const today = new Date().toISOString().slice(0,10);
  const monthStr = today.slice(0,7);
  const dayStart=8, dayEnd=20;
  const shiftW = 52;

  useEffect(()=>{
    fetchHeatmap(today).then(setHeatData);
    fetchUtilization("month", monthStr).then(setUtilMonth);
  },[]);

  if (!heatData || !heatData.machines) return <div style={{padding:40,textAlign:"center",color:"#9ca3af"}}>載入中...</div>;

  const ovMachines = overviewData && overviewData.machines ? overviewData.machines : [];
  const filterOpts = [
    {key:"all",label:"全部顯示"},{key:"low25",label:"< 25%"},{key:"low50",label:"< 50%"},{key:"high75",label:"≥ 75%"},
  ];
  const utilColor = (v,f) => {
    if(f==="low25") return v<25?"#dc2626":"#f9fafb";
    if(f==="low50") return v<50?(v<25?"#dc2626":"#f59e0b"):"#f9fafb";
    if(f==="high75") return v>=75?"#059669":"#f9fafb";
    if(v===0) return "#f3f4f6"; if(v<25) return "#fecaca"; if(v<50) return "#fde68a"; if(v<75) return "#bef264"; return "#4ade80";
  };
  const textColor = (v,f) => {
    if(f==="low25") return v<25?"#fff":"#d1d5db";
    if(f==="low50") return v<50?"#fff":"#d1d5db";
    if(f==="high75") return v>=75?"#fff":"#d1d5db";
    if(v>=75) return "#166534"; if(v>=50) return "#713f12"; if(v>=25) return "#991b1b"; return "#9ca3af";
  };

  const cellW=32, cellH=26, labelW=78;

  // Build full 24h array for each machine
  const machinesWithHours = heatData.machines.map(m => {
    const hourMap = {};
    (m.hours||[]).forEach(h => { hourMap[h.hour] = h; });
    const full24 = Array.from({length:24},(_,h)=>({
      hour: h,
      utilization: hourMap[h] ? hourMap[h].utilization : 0,
      hole_count: hourMap[h] ? hourMap[h].hole_count : 0,
    }));
    const dayHrs = full24.filter(t=>t.hour>=dayStart&&t.hour<dayEnd);
    const nightHrs = full24.filter(t=>t.hour<dayStart||t.hour>=dayEnd);
    const dayAvg = dayHrs.length ? Math.round(dayHrs.reduce((s,t)=>s+t.utilization,0)/dayHrs.length) : 0;
    const nightAvg = nightHrs.length ? Math.round(nightHrs.reduce((s,t)=>s+t.utilization,0)/nightHrs.length) : 0;
    return { ...m, full24, dayAvg, nightAvg };
  });

  const drillHeat = machinesWithHours.filter(m => getMachineType(m.id, ovMachines) === "takeuchi");
  const laserHeat = machinesWithHours.filter(m => getMachineType(m.id, ovMachines) === "kataoka");

  const oDay = machinesWithHours.length ? Math.round(machinesWithHours.reduce((s,m)=>s+m.dayAvg,0)/machinesWithHours.length) : 0;
  const oNight = machinesWithHours.length ? Math.round(machinesWithHours.reduce((s,m)=>s+m.nightAvg,0)/machinesWithHours.length) : 0;

  // Machine ranking by month
  const monthSorted = utilMonth && utilMonth.machines ? [...utilMonth.machines].sort((a,b)=>b.utilization-a.utilization) : [];
  const bottomThreshold = Math.max(monthSorted.length - 3, 0);

  // Render a single heatmap row
  const renderHeatRow = (m, mi) => {
    const typeColor = machineTypeColor(m.id, ovMachines);
    return (
      <div key={m.id} style={{display:"flex",alignItems:"center",marginBottom:2}}>
        <div style={{width:labelW,display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
          <div style={{width:3,height:12,borderRadius:1,background:typeColor,flexShrink:0}}/>
          <span style={{fontSize:10,fontWeight:600,color:"#374151"}}>{m.id}</span>
        </div>
        {m.full24.map((t,hi)=>{
          const v = t.utilization;
          const isH = hoveredCell && hoveredCell.mi===mi && hoveredCell.hi===hi;
          const bg = utilColor(v,filter);
          const tc = textColor(v,filter);
          const isShiftB = t.hour===dayStart||t.hour===dayEnd;
          const isActive = filter==="all"||(filter==="low25"&&v<25)||(filter==="low50"&&v<50)||(filter==="high75"&&v>=75);
          return (
            <div key={hi} onMouseEnter={()=>setHoveredCell({mi,hi,id:m.id,hour:t.hour,util:v,holes:t.hole_count})} onMouseLeave={()=>setHoveredCell(null)}
              style={{width:cellW,height:cellH,background:bg,borderLeft:isShiftB?"2px solid #3b82f6":"1px solid rgba(255,255,255,0.8)",borderTop:"1px solid rgba(255,255,255,0.8)",
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:isActive?700:400,color:tc,cursor:"default",
                transform:isH?"scale(1.15)":"scale(1)",transition:"all 0.1s",zIndex:isH?5:1,position:"relative",borderRadius:isH?3:0,
                boxShadow:isH?"0 2px 8px rgba(0,0,0,0.2)":"none",
              }}>
              {(isActive&&v>0)||isH ? Math.round(v) : ""}
            </div>
          );
        })}
        <div style={{width:shiftW,marginLeft:8,textAlign:"center",fontSize:10,fontWeight:700,color:m.dayAvg>=TARGET?"#059669":"#d97706",background:m.dayAvg>=TARGET?"#f0fdf4":"#fffbeb",borderRadius:3,padding:"3px 0"}}>{m.dayAvg}%</div>
        <div style={{width:shiftW,textAlign:"center",fontSize:10,fontWeight:700,color:m.nightAvg>=TARGET?"#059669":m.nightAvg>=40?"#d97706":"#dc2626",background:m.nightAvg>=TARGET?"#f0fdf4":m.nightAvg>=40?"#fffbeb":"#fef2f2",borderRadius:3,padding:"3px 0"}}>{m.nightAvg}%</div>
      </div>
    );
  };

  return (
    <div>
      {monthSorted.length > 0 && (
        <div style={{background:"#fff",borderRadius:10,border:"1px solid #e5e7eb",padding:"18px 24px",marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:600,color:"#374151",marginBottom:12}}>各機台稼動率排行（本月）</div>
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            {monthSorted.map((m,i)=>{
              const v = m.utilization;
              const c = v>=TARGET?"#059669":v>=50?"#d97706":"#dc2626";
              const typeColor = machineTypeColor(m.id, ovMachines);
              return (
                <div key={m.id} style={{display:"flex",alignItems:"center",gap:8,height:26}}>
                  <span style={{width:20,height:20,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,flexShrink:0,
                    background:i<3?"#f0fdf4":i>=bottomThreshold?"#fef2f2":"#f9fafb",color:i<3?"#059669":i>=bottomThreshold?"#dc2626":"#9ca3af"}}>{i+1}</span>
                  <div style={{width:4,height:14,borderRadius:2,background:typeColor,flexShrink:0}}/>
                  <span style={{width:50,fontSize:11,fontWeight:600,color:"#374151",flexShrink:0}}>{m.id}</span>
                  <div style={{flex:1,height:14,background:"#f3f4f6",borderRadius:3,overflow:"hidden",position:"relative"}}>
                    <div style={{width:`${v}%`,height:"100%",background:c,borderRadius:3,transition:"width 0.5s",display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:5}}>
                      {v>18&&<span style={{fontSize:9,fontWeight:700,color:"#fff"}}>{v}%</span>}
                    </div>
                    <div style={{position:"absolute",left:`${TARGET}%`,top:0,bottom:0,width:1.5,background:"#3b82f6",opacity:0.5}}/>
                  </div>
                  {v<=18&&<span style={{fontSize:10,fontWeight:700,color:c,width:28}}>{v}%</span>}
                  <span style={{fontSize:10,color:"#6b7280",width:64,textAlign:"right",flexShrink:0}}>{fmt(m.hole_count)} 孔</span>
                </div>
              );
            })}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12,marginTop:10,fontSize:11,color:"#9ca3af"}}>
            <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:4,height:10,borderRadius:1,background:COLOR_DRILL}}/><span>機鑽</span></div>
            <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:4,height:10,borderRadius:1,background:COLOR_LASER}}/><span>雷鑽</span></div>
            <span>｜</span>
            <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:12,height:2,background:"#3b82f6",borderRadius:1}}/><span>目標 {TARGET}%</span></div>
          </div>
        </div>
      )}

      <div style={{display:"flex",gap:12,marginBottom:16}}>
        {[
          {label:"日班平均（08–20）",val:`${oDay}%`,color:oDay>=TARGET?"#059669":"#d97706",bg:"#f0fdf4",border:"#bbf7d0"},
          {label:"夜班平均（20–08）",val:`${oNight}%`,color:oNight>=TARGET?"#059669":"#dc2626",bg:oNight>=TARGET?"#f0fdf4":"#fef2f2",border:oNight>=TARGET?"#bbf7d0":"#fecaca"},
          {label:"日夜落差",val:`${Math.abs(oDay-oNight)}%`,color:"#dc2626",bg:"#fef2f2",border:"#fecaca"},
        ].map((c,i)=>(
          <div key={i} style={{flex:1,background:c.bg,borderRadius:10,padding:"12px 18px",border:`1px solid ${c.border}`}}>
            <div style={{fontSize:11,color:"#6b7280",marginBottom:2}}>{c.label}</div>
            <div style={{fontSize:28,fontWeight:800,color:c.color,lineHeight:1}}>{c.val}</div>
          </div>
        ))}
      </div>

      <div style={{background:"#fff",borderRadius:10,border:"1px solid #e5e7eb",padding:"16px 20px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{fontSize:13,fontWeight:600,color:"#374151"}}>24 小時稼動熱力圖（{today}）</div>
          <div style={{display:"flex",gap:4}}>
            {filterOpts.map(f=>(
              <button key={f.key} onClick={()=>setFilter(f.key)} style={{
                padding:"5px 12px",borderRadius:6,border:"1.5px solid",fontSize:11,fontWeight:600,cursor:"pointer",transition:"all 0.15s",
                background:filter===f.key?(f.key==="low25"?"#dc2626":f.key==="low50"?"#d97706":f.key==="high75"?"#059669":"#111827"):"#fff",
                color:filter===f.key?"#fff":"#6b7280",borderColor:filter===f.key?"transparent":"#e5e7eb",
              }}>{f.label}</button>
            ))}
          </div>
        </div>
        <div style={{overflowX:"auto"}}>
          <div style={{minWidth:labelW+cellW*24+shiftW*2+16}}>
            <div style={{display:"flex",alignItems:"flex-end",marginBottom:2,paddingLeft:labelW}}>
              {Array.from({length:24},(_,h)=>(
                <div key={h} style={{width:cellW,textAlign:"center",fontSize:10,fontWeight:h===dayStart||h===dayEnd?700:400,color:h===dayStart||h===dayEnd?"#3b82f6":"#9ca3af"}}>
                  {h.toString().padStart(2,"0")}
                </div>
              ))}
              <div style={{width:shiftW,textAlign:"center",fontSize:10,fontWeight:600,color:"#059669",marginLeft:8}}>日班</div>
              <div style={{width:shiftW,textAlign:"center",fontSize:10,fontWeight:600,color:"#6366f1"}}>夜班</div>
            </div>
            <div style={{display:"flex",marginBottom:4,paddingLeft:labelW}}>
              {Array.from({length:24},(_,h)=>(
                <div key={h} style={{width:cellW,height:3,background:(h>=dayStart&&h<dayEnd)?"#d1fae5":"#e0e7ff"}}/>
              ))}
            </div>
            {drillHeat.map((m,mi)=> renderHeatRow(m, mi))}
            {laserHeat.length > 0 && (
              <div style={{display:"flex",alignItems:"center",margin:"6px 0",paddingLeft:labelW}}>
                <div style={{flex:1,height:2,background:"#e5e7eb",borderRadius:1}}/>
                <span style={{fontSize:10,color:"#9ca3af",padding:"0 10px",fontWeight:600}}>雷鑽 Kataoka</span>
                <div style={{flex:1,height:2,background:"#e5e7eb",borderRadius:1}}/>
              </div>
            )}
            {laserHeat.map((m,li)=> renderHeatRow(m, drillHeat.length + li))}
            {hoveredCell&&(
              <div style={{position:"fixed",top:8,right:28,zIndex:100,background:"#111827",color:"#fff",padding:"8px 14px",borderRadius:8,fontSize:12,fontWeight:500,boxShadow:"0 4px 12px rgba(0,0,0,0.15)",display:"flex",gap:12}}>
                <span style={{fontWeight:700}}>{hoveredCell.id}</span>
                <span>{String(hoveredCell.hour).padStart(2,"0")}:00</span>
                <span style={{fontWeight:700,color:hoveredCell.util>=TARGET?"#4ade80":hoveredCell.util>=50?"#fbbf24":"#f87171"}}>{Math.round(hoveredCell.util)}%</span>
                <span style={{color:"#9ca3af"}}>{fmt(hoveredCell.holes)} 孔</span>
                <span style={{color:"#9ca3af"}}>{hoveredCell.hour>=8&&hoveredCell.hour<20?"日班":"夜班"}</span>
              </div>
            )}
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10,marginTop:14,fontSize:11,color:"#6b7280",flexWrap:"wrap"}}>
          {filter==="all"?(
            <>
              <span>稼動率：</span>
              {[{label:"0%",color:"#f3f4f6"},{label:"<25%",color:"#fecaca"},{label:"25-49%",color:"#fde68a"},{label:"50-74%",color:"#bef264"},{label:"≥75%",color:"#4ade80"}].map((c,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:3}}>
                  <div style={{width:12,height:8,borderRadius:2,background:c.color,border:"1px solid #e5e7eb"}}/><span>{c.label}</span>
                </div>
              ))}
            </>
          ):(
            <>
              <span>篩選：</span>
              <div style={{display:"flex",alignItems:"center",gap:3}}>
                <div style={{width:12,height:8,borderRadius:2,background:filter==="low25"?"#dc2626":filter==="low50"?"#f59e0b":"#059669"}}/><span>符合</span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:3}}>
                <div style={{width:12,height:8,borderRadius:2,background:"#f9fafb",border:"1px solid #e5e7eb"}}/><span>淡化</span>
              </div>
            </>
          )}
          <span>｜</span>
          <div style={{display:"flex",alignItems:"center",gap:3}}>
            <div style={{width:2,height:8,background:"#3b82f6"}}/><span>班次分界</span>
          </div>
        </div>
      </div>
    </div>
  );
}

// ============ TAB 4: DETAIL ============
function DetailTab({overviewData}) {
  if (!overviewData) return <div style={{padding:40,textAlign:"center",color:"#9ca3af"}}>載入中...</div>;
  const machines = overviewData.machines || [];
  const running = machines.filter(m => mapState(m.state) === "RUN");
  const notRunning = machines.filter(m => mapState(m.state) !== "RUN");

  return (
    <div>
      <div style={{fontSize:13,fontWeight:600,color:"#374151",marginBottom:10}}>稼動中（{running.length} 台）</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(340px, 1fr))",gap:12,marginBottom:24}}>
        {running.map(m => {
          const typeColor = machineTypeColor(m.id, machines);
          const typeLabel = getMachineType(m.id, machines) === "kataoka" ? "雷鑽" : "機鑽";
          return (
            <div key={m.id} style={{background:"#fff",borderRadius:10,border:"1px solid #e5e7eb",overflow:"hidden"}}>
              <div style={{background:typeColor,color:"#fff",padding:"8px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:15,fontWeight:800}}>{m.id}</span>
                  <span style={{fontSize:10,fontWeight:600,background:"rgba(255,255,255,0.2)",padding:"1px 8px",borderRadius:10}}>{typeLabel}</span>
                </div>
                <span style={{fontSize:12,fontWeight:600}}>{durStr(m.duration_minutes||0)}</span>
              </div>
              <div style={{padding:"12px 14px"}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px 20px",fontSize:13,marginBottom:12}}>
                  {[
                    ["工號", m.work_order ? `${m.work_order}${m.work_order_side?`.${m.work_order_side}`:""}` : "—", "#111827"],
                    ["程式", m.program || "—", "#111827"],
                    ["鑽頭", m.drill_dia ? `${m.drill_dia} mm` : "—", typeColor],
                    ["工具號", m.tool_num || "—", "#111827"],
                  ].map(arr => (
                    <div key={arr[0]}>
                      <div style={{fontSize:10,color:"#9ca3af",marginBottom:1}}>{arr[0]}</div>
                      <div style={{fontWeight:700,color:arr[2]}}>{arr[1]}</div>
                    </div>
                  ))}
                </div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",borderRadius:8,background:"#f0fdf4",border:"1px solid #bbf7d0"}}>
                  <span style={{fontSize:12,color:"#059669",fontWeight:500}}>今日孔數</span>
                  <span style={{fontSize:18,fontWeight:800,color:"#059669",fontVariantNumeric:"tabular-nums"}}>{fmt(m.hole_count_today)}</span>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      <div style={{fontSize:13,fontWeight:600,color:"#9ca3af",marginBottom:8}}>未稼動（{notRunning.length} 台）</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
        {notRunning.map(m => {
          const displayState = mapState(m.state);
          const s = SC[displayState] || SC.OFFLINE;
          const typeColor = machineTypeColor(m.id, machines);
          return (
            <div key={m.id} style={{display:"flex",alignItems:"center",gap:6,background:"#fff",borderRadius:8,padding:"8px 12px",border:"1px solid #e5e7eb"}}>
              <div style={{width:3,height:14,borderRadius:1,background:typeColor}}/>
              <div style={{width:8,height:8,borderRadius:2,background:s.bg}}/>
              <span style={{fontSize:12,fontWeight:700,color:"#374151"}}>{m.id}</span>
              <span style={{fontSize:11,color:s.bg,fontWeight:600}}>{s.label}</span>
              <span style={{fontSize:10,color:"#9ca3af"}}>{durStr(m.duration_minutes||0)}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ============ MAIN APP ============
function Dashboard() {
  const [tab, setTab] = useState("overview");
  const [cd, setCd] = useState(REFRESH_INTERVAL);
  const [overviewData, setOverviewData] = useState(null);
  const [apiOk, setApiOk] = useState(true);

  const loadData = useCallback(async () => {
    try {
      const data = await fetchOverview();
      setOverviewData(data);
      // Check if we got real API data by trying the fetch directly
      try {
        await apiFetch("/api/drilling/overview");
        setApiOk(true);
      } catch(e) {
        setApiOk(false);
      }
    } catch(e) {
      console.error("Failed to load data:", e);
    }
  }, []);

  useEffect(()=>{
    loadData();
  },[loadData]);

  useEffect(()=>{
    const t = setInterval(()=>{
      setCd(p => {
        if (p <= 0) {
          loadData();
          return REFRESH_INTERVAL;
        }
        return p - 1;
      });
    }, 1000);
    return () => clearInterval(t);
  },[loadData]);

  return (
    <div style={{fontFamily:"'Noto Sans TC','Microsoft JhengHei','Helvetica Neue',sans-serif",background:"#f6f7f9",minHeight:"100vh",color:"#1a1a2e"}}>
      <Header tab={tab} setTab={setTab} countdown={cd} apiOk={apiOk}/>
      <div style={{padding:"20px 28px",maxWidth:1360,margin:"0 auto"}}>
        {tab==="overview"&&<OverviewTab data={overviewData}/>}
        {tab==="ranking"&&<RankingTab overviewData={overviewData}/>}
        {tab==="analysis"&&<AnalysisTab overviewData={overviewData}/>}
        {tab==="detail"&&<DetailTab overviewData={overviewData}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard/>);
</script>
</body>
