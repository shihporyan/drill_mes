<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>機台監控看板</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        /* 模擬等距視角的背景網格與容器 */
        .dashboard-container {
            position: relative;
            width: 1000px;
            height: 700px;
            background-color: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            /* 繪製等距菱形網格背景 */
            background-image: 
                linear-gradient(30deg, #f0f0f0 1px, transparent 1px),
                linear-gradient(150deg, #f0f0f0 1px, transparent 1px);
            background-size: 60px 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* 單個機台的容器 */
        .machine-wrapper {
            position: absolute;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 狀態標籤 (Tooltip) */
        .status-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 8px 12px;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.08);
            position: relative;
            margin-bottom: 40px; /* 與機台圖示保持距離 */
            min-width: 90px;
            text-align: left;
        }

        /* 標籤下方的小尾巴 */
        .status-card::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 8px 8px 0;
            border-style: solid;
            border-color: white transparent transparent transparent;
        }
        .status-card::before {
            content: '';
            position: absolute;
            bottom: -9px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 9px 9px 0;
            border-style: solid;
            border-color: #e0e0e0 transparent transparent transparent;
            z-index: -1;
        }

        /* 標籤內的排版 */
        .card-header {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 16px;
            font-weight: bold;
            color: #333;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .status-dot.normal { background-color: #22c55e; } /* 綠色 */
        .status-dot.error { background-color: #ef4444; }  /* 紅色 */

        .alert-icon {
            color: #ef4444;
            font-size: 14px;
            margin-left: 4px;
        }

        .rpm-text {
            font-size: 13px;
            margin-top: 4px;
            color: #555;
            margin-left: 16px; /* 對齊文字 */
        }
        
        .rpm-text.error {
            color: #ef4444;
            font-weight: bold;
            margin-left: 0;
        }

        /* 模擬機台的 SVG 圖示 Placeholder */
        .machine-icon {
            width: 80px;
            height: 80px;
            position: absolute;
            bottom: -30px;
            opacity: 0.7;
            z-index: 0;
        }
    </style>
</head>

                <div class="machine-icon">
                    ${machineSvg}
                </div>
